plugins {
    id 'multiloader-loader'
    id 'net.neoforged.moddev'
}

neoForge {
    version = neoforge_version
    // Automatically enable neoforge AccessTransformers if the file exists
    def at = project(':common').file('src/main/resources/META-INF/accesstransformer.cfg')
    if (at.exists()) {
        accessTransformers.add(at.absolutePath)
    }
    runs {
        configureEach {
            systemProperty('neoforge.enabledGameTestNamespaces', mod_id)
            ideName = "NeoForge ${it.name.capitalize()} (${project.path})"
        }

        client {
            client()
        }

        server {
            server()
        }
    }

    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

dependencies {
    implementation files(rootProject.file('libs/enchanted_ui-common-26.2-snapshot-7-0.0.3-dev.jar'))
}

tasks.named('processResources', ProcessResources).configure {
    // In dev runs the dependency jar is on the classpath (so classes work) but its assets are not treated as a mod
    // resource pack by Minecraft. Copy the dependency assets into our processed resources so translations/textures
    // resolve while debugging.
    from(zipTree(rootProject.file('libs/enchanted_ui-common-26.2-snapshot-7-0.0.3-dev.jar'))) {
        include 'assets/enchanted_ui/**'
        exclude 'META-INF/**', 'LICENSE'
    }
}

jar {
    from(zipTree(rootProject.file('libs/enchanted_ui-common-26.2-snapshot-7-0.0.3-dev.jar'))) {
        exclude 'META-INF/MANIFEST.MF', 'LICENSE'
    }
}
