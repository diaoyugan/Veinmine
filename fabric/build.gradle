plugins {
    id 'multiloader-loader'
    id 'net.fabricmc.fabric-loom'
}

repositories {
    maven {
        name = "Terraformers"
        url = "https://maven.terraformersmc.com/"
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    implementation "net.fabricmc:fabric-loader:${fabric_loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${fabric_version}"
    implementation "com.terraformersmc:modmenu:${project.modmenu_version}"
    implementation files(rootProject.file(eui_location))
}

tasks.named('processResources', ProcessResources).configure {
    // In dev runs the library jar is on the classpath, but Minecraft does not discover its assets as a mod
    // resource pack. Copy only the EUI assets used by this mod; its icon is not displayed from the shaded jar.
    from(zipTree(rootProject.file(eui_location))) {
        include 'assets/enchanted_ui/**'
        exclude 'assets/enchanted_ui/icon.png'
    }
}

jar {
    from(zipTree(rootProject.file(eui_location))) {
        exclude 'META-INF/MANIFEST.MF', 'LICENSE', 'assets/enchanted_ui/**'
    }
}

loom {
    def aw = project(':common').file("src/main/resources/${mod_id}.accesswidener")
    if (aw.exists()) {
        accessWidenerPath.set(aw)
    }
//    mixin {
//        defaultRefmapName.set("${mod_id}.refmap.json")
//    }
    runs {
        client {
            client()
            setConfigName('Fabric Client')
            ideConfigGenerated(true)
            runDir('runs/client')
        }
        server {
            server()
            setConfigName('Fabric Server')
            ideConfigGenerated(true)
            runDir('runs/server')
        }
    }
}
